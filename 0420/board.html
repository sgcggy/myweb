<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="SK하이닉스 메인터넌스 포트폴리오 자유게시판입니다. 자유롭게 의견을 남겨주세요.">
    <title>자유게시판 | SK하이닉스 유지보수</title>
    <link rel="stylesheet" href="index.css">
    <!-- FontAwesome for Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 보드 전용 추가 스타일 (index.css에 이어 추가) */
        #board-page { display: block !important; padding-top: 100px; min-height: 100vh; }
        .board-card { margin-bottom: 50px; }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fa-solid fa-microchip"></i> SK하이닉스 유지보수
            </div>
            <ul class="nav-links">
                <li><a href="index.html">홈으로 돌아가기</a></li>
                <li><a href="board.html" class="active">자유게시판</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="board">
            <h2 class="section-title visible">COMMUNITY: <br><span>자유게시판</span></h2>
            
            <div class="card visible board-card">
                <!-- Board List View -->
                <div id="board-list-view">
                    <div class="board-header">
                        <p class="section-desc">자유롭게 기록을 남기거나 질문을 올려주세요.</p>
                        <button class="small-btn highlight" onclick="showBoardWrite()">
                            <i class="fa-solid fa-pen"></i> 글쓰기
                        </button>
                    </div>
                    <div class="table-wrapper">
                        <table class="board-table">
                            <thead>
                                <tr>
                                    <th style="width: 8%;">No</th>
                                    <th style="width: 50%;">제목</th>
                                    <th style="width: 15%;">작성자</th>
                                    <th style="width: 27%;">날짜</th>
                                </tr>
                            </thead>
                            <tbody id="board-body">
                                <!-- Posts will be injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Board Write/Edit View -->
                <div id="board-write-view" style="display: none;">
                    <h3 id="board-form-title">게시글 작성</h3>
                    <form id="board-form" class="contact-form">
                        <input type="hidden" id="edit-id">
                        <div class="form-grid">
                            <div class="input-group">
                                <label for="board-author">작성자</label>
                                <input type="text" id="board-author" placeholder="이름을 입력하세요" required>
                            </div>
                            <div class="input-group">
                                <label for="board-title">제목</label>
                                <input type="text" id="board-title" placeholder="글 제목을 입력하세요" required>
                            </div>
                            <div class="input-group">
                                <label for="board-password">비밀번호</label>
                                <input type="password" id="board-password" placeholder="수정/삭제 시 필요" required>
                            </div>
                        </div>
                        <div class="input-group">
                            <label for="board-content">내용</label>
                            <textarea id="board-content" rows="8" placeholder="내용을 자유롭게 입력하세요" required></textarea>
                        </div>
                        <div class="btn-group">
                            <button type="submit" class="submit-btn" id="save-btn">저장하기</button>
                            <button type="button" class="submit-btn secondary" onclick="showBoardList()">취소</button>
                        </div>
                    </form>
                </div>

                <!-- Board Read View -->
                <div id="board-read-view" style="display: none;">
                    <div class="board-read-header">
                        <h3 id="read-title">글 제목</h3>
                        <div class="read-info">
                            <span id="read-author">작성자</span> | <span id="read-date">2024-00-00</span>
                        </div>
                    </div>
                    <div id="read-content" class="read-content">
                        글 내용이 표시됩니다.
                    </div>
                    <div class="btn-group">
                        <button class="small-btn highlight" onclick="editPost()">수정</button>
                        <button class="small-btn" onclick="deletePost()">삭제</button>
                        <button class="small-btn secondary" onclick="showBoardList()">목록으로</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <i class="fa-solid fa-graduation-cap"></i> 동양미래대학교 <br> 
                반도체 부트캠프 & 로봇 소프트웨어
            </div>
            <p>© 2024 SK하이닉스 메인터넌스 포트폴리오 프로젝트. 실무 준비성을 증명하기 위해 전략적으로 제작되었습니다.</p>
            
            <div class="official-links">
                <a href="https://www.dongyang.ac.kr/dmu/4495/subview.do" target="_blank" class="official-link-item">
                    <i class="fa-solid fa-building-columns"></i> 동양미래대학교 공식 홈페이지
                </a>
                <a href="https://cafe.naver.com/dongyangmirae" target="_blank" class="official-link-item">
                    <i class="fa-solid fa-blog"></i> 공식 네이버 카페
                </a>
                <a href="https://www.youtube.com/@auto2con" target="_blank" class="official-link-item">
                    <i class="fa-brands fa-youtube"></i> 로봇소프트웨어과 유튜브
                </a>
            </div>
        </div>
    </footer>

    <!-- Firebase SDK (Compatibility Mode for existing onclick handlers) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="board.js"></script>
</body>
</html>
